<svg width="460" height="80" viewBox="0 0 460 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Waveform bars -->
  <rect x="4"  y="24" width="9" height="32" rx="4.5" fill="url(#grad)"/>
  <rect x="18" y="12" width="9" height="56" rx="4.5" fill="url(#grad)"/>
  <rect x="32" y="18" width="9" height="44" rx="4.5" fill="url(#grad)"/>
  <rect x="46" y="6"  width="9" height="68" rx="4.5" fill="url(#grad)"/>
  <rect x="60" y="20" width="9" height="40" rx="4.5" fill="url(#grad)"/>
  <rect x="74" y="14" width="9" height="52" rx="4.5" fill="url(#grad)" opacity="0.55"/>

  <!-- Divider -->
  <line x1="100" y1="8" x2="100" y2="72" stroke="url(#grad)" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Caption lines -->
  <rect x="114" y="22" width="72" height="8" rx="4" fill="url(#grad)" opacity="0.9"/>
  <rect x="114" y="36" width="54" height="8" rx="4" fill="url(#grad)" opacity="0.55"/>
  <rect x="114" y="50" width="62" height="8" rx="4" fill="url(#grad)" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="198" y="54" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="38" font-weight="700" fill="url(#grad)" letter-spacing="-1">captioneer</text>
</svg>
